<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas Comerciais | PMS J7S</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/core/sinaliza-core.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            /* HIGH-END NEON / GAMIFICATION THEME */
            --bg: #0B1220;
            --card: #151A23; 
            --card-2: #0F172A;
            --primary: #3B82F6;
            
            /* NEON GREEN */
            --neon-green: #4ADE80;
            --neon-green-dark: #16A34A;
            --neon-glow: rgba(74, 222, 128, 0.4);
            
            /* NEON RED */
            --neon-red: #EF4444;
            --neon-red-glow: rgba(239, 68, 68, 0.4);

            /* NEON PURPLE/PINK */
            --neon-purple: #D946EF;

            --text: #E5E7EB;
            --text-muted: #9CA3AF;
            --success: #10B981;
            --danger: #EF4444;
            --border: #1F2933;

            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;

            --shadow-card: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); color: var(--text); display: flex; font-size: 14px; min-height: 100vh; overflow-x: hidden; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        /* ========================================================= */
        /* SIDEBAR                                                   */
        /* ========================================================= */
        aside { 
            width: 260px; min-width: 260px; background: transparent; 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            padding: 24px 20px; z-index: 100; position: fixed; height: 100vh; top: 0; left: 0;
        }
        
        .logo-area { margin-bottom: 45px; display: flex; align-items: center; gap: 12px; padding-left: 5px;}
        .logo-icon { 
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark)); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            color: #064E3B; font-size: 1.6rem; box-shadow: 0 8px 20px var(--neon-glow);
        }
        .logo-text { color: var(--text); font-weight: 900; font-size: 1.4rem; letter-spacing: 0.5px; }

        nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-btn { 
            background: transparent; color: var(--text-muted); border: none; padding: 14px 18px; 
            width: 100%; border-radius: 50px; cursor: pointer; text-align: left; font-weight: 600; 
            display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: 0.3s;
        }
        .nav-btn i { font-size: 1.3rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-btn.active { 
            background: linear-gradient(to right, rgba(74, 222, 128, 0.1), transparent); 
            color: var(--neon-green); border-left: 3px solid var(--neon-green); 
            border-radius: 0 50px 50px 0; padding-left: 15px;
        }

        .bottom-actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
        .logout-btn { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 14px 18px; width: 100%; border-radius: 50px; cursor: pointer; text-align: left; 
            font-weight: 700; display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: all 0.3s;
        }

        /* ========================================================= */
        /* CONTEÚDO PRINCIPAL                                        */
        /* ========================================================= */
        main { flex: 1; padding: 30px 40px; margin-left: 260px; overflow-y: auto;}
        
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; gap: 20px; flex-wrap: wrap;}
        .page-header h1 { font-weight: 900; font-size: 2.2rem; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; display: flex; align-items: center; gap: 12px;}
        .page-header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; font-weight: 500; }

        .btn-primary { 
            background: linear-gradient(135deg, var(--neon-green), var(--neon-green-dark)); color: #064E3B; 
            padding: 12px 24px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; 
            display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px var(--neon-glow); transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(74, 222, 128, 0.6); }

        select { 
            padding: 12px 20px; font-size: 0.95rem; font-weight: 600; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); border-radius: 50px; color: var(--text); outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--neon-green); box-shadow: 0 0 0 2px var(--neon-glow); }
        select option { background: var(--card); color: var(--text); }

        /* TOGGLE DE PERSPECTIVA */
        .view-toggle {
            display: flex; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 50px; padding: 5px; gap: 5px;
        }
        .view-toggle button {
            background: transparent; color: var(--text-muted); border: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .view-toggle button.active {
            background: var(--card-2); color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ========================================================= */
        /* CARTÕES WIDGET (COM ANIMAÇÃO DE CASCATA)                  */
        /* ========================================================= */
        #seller-list-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 25px;
        }

        .seller-widget { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-lg); 
            padding: 25px; display: flex; flex-direction: column; gap: 25px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), var(--shadow-card); 
            
            /* EFEITO 1: PREPARAÇÃO PARA A CASCATA */
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        }
        .seller-widget:hover { border-color: rgba(74, 222, 128, 0.2); }

        /* CLASSE QUE É INJETADA PELO JS PARA REVELAR O CARD */
        .seller-widget.show-anim {
            opacity: 1;
            transform: translateY(0);
        }

        .widget-header { display: flex; justify-content: space-between; align-items: center; }
        
        .fire-block { display: flex; align-items: center; gap: 15px; }
        .fire-icon { font-size: 2.2rem; transition: 0.3s;}
        
        .streak-info { display: flex; flex-direction: column; }
        .streak-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .streak-val { font-size: 1.5rem; font-weight: 900; color: var(--text); display: flex; align-items: baseline; gap: 5px; line-height: 1.1; margin-top: 2px;}
        .streak-val span { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;}

        .seller-profile { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.03);}
        .seller-avatar { 
            width: 32px; height: 32px; border-radius: 50%; background: var(--border); 
            display: flex; align-items: center; justify-content: center; font-weight: 900; 
            color: var(--text); font-size: 0.9rem;
        }
        .seller-name { font-weight: 800; color: var(--text); font-size: 0.95rem; }

        /* ========================================================= */
        /* MILESTONES (AS ARGOLAS)                                   */
        /* ========================================================= */
        .milestones-container { display: flex; justify-content: space-between; align-items: center; position: relative; padding: 10px 0; }
        .milestone-item { display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; z-index: 2; width: 35px;}
        
        .m-circle {
            width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: 0.4s;
        }
        .m-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); transition: 0.3s; }

        .m-circle.done {
            background: linear-gradient(180deg, var(--neon-green), var(--neon-green-dark));
            box-shadow: 0 0 15px var(--neon-glow); color: #064E3B;
        }
        .m-circle.active {
            border: 2px solid var(--neon-green); background: transparent;
            box-shadow: 0 0 10px var(--neon-glow), inset 0 0 10px var(--neon-glow);
        }
        .m-circle.pending {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
        }
        .milestone-item .m-circle.done + .m-label { color: var(--text); font-weight: 800;}

        /* ESTADO ESPECIAL: 75K (META MÍNIMA - VERMELHO) */
        .m-circle.min-target.pending {
            border: 1px solid rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.05);
        }
        .m-circle.min-target.active {
            border: 2px solid var(--neon-red); background: transparent;
            box-shadow: 0 0 10px var(--neon-red-glow), inset 0 0 10px var(--neon-red-glow);
        }
        .m-circle.min-target.done {
            background: linear-gradient(180deg, #F87171, var(--neon-red));
            box-shadow: 0 0 15px var(--neon-red-glow); color: #450a0a;
        }
        .m-label.min-target { color: var(--neon-red); font-weight: 800; }
        .milestone-item .m-circle.min-target.done + .m-label { color: #FCA5A5; }

        .milestones-line {
            position: absolute; top: 27px; left: 17px; right: 17px; height: 2px;
            background: rgba(255,255,255,0.05); z-index: 1;
        }

        /* ========================================================= */
        /* PROGRESSO EXATO                                           */
        /* ========================================================= */
        .exact-progress { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .exact-header { display: flex; justify-content: space-between; align-items: flex-end; }
        
        .steps-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .pct-label { font-size: 0.85rem; font-weight: 800; color: var(--text-muted); }

        .progress-track { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .progress-fill { 
            height: 100%; border-radius: 10px; position: relative; 
            background: linear-gradient(90deg, var(--neon-green), var(--neon-green-dark));
            box-shadow: 0 0 10px var(--neon-glow);
            transition: width 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sec-badge {
            padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            display: inline-flex; align-items: center; gap: 6px; margin-top: -5px; transition: 0.3s;
        }
        .sec-badge.fat {
            background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .sec-badge.venda {
            background: rgba(217, 70, 239, 0.1); color: var(--neon-purple); border: 1px solid rgba(217, 70, 239, 0.2);
        }
    </style>
</head>
<body>
    
    <aside>
        <div class="logo-area">
            <div class="logo-icon"><i class="ph-bold ph-hexagon"></i></div>
            <span class="logo-text">PMS J7S</span>
        </div>
        
        <nav style="flex:1;">
            <button class="nav-btn" onclick="window.location.href='diretoria.html'">
                <i class="ph-fill ph-presentation-chart"></i> Painel Diretoria
            </button>
            <button class="nav-btn active" onclick="return false;">
                <i class="ph-fill ph-target"></i> Metas Comerciais
            </button>
            <button class="nav-btn" onclick="window.location.href='dashboard-comercial.html'">
                <i class="ph-fill ph-briefcase"></i> Gestão Comercial
            </button>
            <button class="nav-btn" onclick="window.location.href='admin.html'">
                <i class="ph-fill ph-squares-four"></i> Visão Operacional
            </button>
        </nav>
        
        <div class="bottom-actions">
            <button onclick="logout()" class="logout-btn">
                <i class="ph-bold ph-sign-out"></i> Sair
            </button>
        </div>
    </aside>

    <main>
        <div class="page-header">
            <div>
                <h1><i class="ph-fill ph-fire" style="color: #EF4444; filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.5));"></i> Tracker de Metas</h1>
                <p>Acompanhamento gamificado com perspetiva dupla. <span style="color:var(--danger); font-weight:700;">Vermelho = Meta Mínima.</span></p>
            </div>
            
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="view-toggle">
                    <button class="active" id="btn-vendas" onclick="setPerspective('vendas')">
                        <i class="ph-bold ph-rocket-launch"></i> Vendas
                    </button>
                    <button id="btn-faturado" onclick="setPerspective('faturado')">
                        <i class="ph-bold ph-wallet"></i> Faturamento
                    </button>
                </div>

                <select id="period-filter" onchange="renderMetas()">
                    <option value="this_month" selected>Mês Atual</option>
                    <option value="last_month">Mês Passado</option>
                    <option value="this_year">Ano Vigente</option>
                </select>
                <button class="btn-primary" onclick="loadData()" id="btn-sync">
                    <i class="ph-bold ph-arrows-clockwise"></i> Sincronizar
                </button>
            </div>
        </div>

        <div id="loading-state" style="text-align: center; padding: 100px; color: var(--text-muted);">
            <i class="ph-bold ph-spinner ph-spin" style="font-size: 4rem; color: var(--neon-green); margin-bottom: 20px;"></i>
            <h2>Processando Milestones...</h2>
        </div>

        <div id="dashboard-content" style="display: none;">
            <div id="seller-list-container">
                <!-- Gerado via JS -->
            </div>
        </div>
    </main>

    <script>
        // ====================================================
        // 🔒 CONTROLE DE SESSÃO E DADOS
        // ====================================================
        const sessaoString = localStorage.getItem('sinaliza_sessao');
        if (!sessaoString) window.location.href = 'index.html';

        function logout() { localStorage.removeItem('sinaliza_sessao'); window.location.href = 'index.html'; }

        const API_URL = '/api';
        let ordersData = [];
        let configWorkflow = [];
        
        let currentPerspective = 'vendas';

        const numFmt = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
        const moneyFmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });
        
        const META_IDEAL = 100000; 
        const MILESTONES = [15, 25, 35, 45, 55, 65, 75, 85, 95, 100]; 

        function getSafeStatus(val) { return String(val || '').trim().toLowerCase(); }

        window.onload = async () => { await loadData(); };

        function setPerspective(type) {
            currentPerspective = type;
            document.getElementById('btn-vendas').classList.toggle('active', type === 'vendas');
            document.getElementById('btn-faturado').classList.toggle('active', type === 'faturado');
            renderMetas();
        }

        async function loadData() {
            const btn = document.getElementById('btn-sync');
            if(btn) btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Sincronizando...';
            
            document.getElementById('loading-state').style.display = 'block';
            document.getElementById('dashboard-content').style.display = 'none';

            try {
                const [wfRes, ordRes] = await Promise.all([
                    fetch(`${API_URL}/config/workflow`).then(r=>r.json()).catch(()=>null),
                    fetch(`${API_URL}/pedidos`).then(r=>r.json()).catch(()=>null)
                ]);
                
                if(wfRes && wfRes.dados) configWorkflow = typeof wfRes.dados === 'string' ? JSON.parse(wfRes.dados) : wfRes.dados;

                if(ordRes) {
                    ordersData = ordRes.map(o => ({
                        id: o.ID || o.id,
                        sales: o.VENDEDOR || o.sales,
                        value: o.VALOR !== undefined ? o.VALOR : o.value,
                        status: o.STATUS || o.status,
                        issue_date: o.DATA_EMISSAO || o.issue_date,
                        history: (typeof (o.HISTORY || o.history) === 'string') ? JSON.parse(o.HISTORY || o.history || '[]') : (o.HISTORY || o.history || []),
                        created_at: o.CREATED_AT || o.created_at || o.DATA_EMISSAO
                    }));
                    renderMetas();
                }
            } catch(e) {
                console.error("Erro:", e);
                Swal.fire('Falha', 'Não foi possível carregar os dados.', 'error');
            } finally {
                if(btn) btn.innerHTML = '<i class="ph-bold ph-arrows-clockwise"></i> Sincronizar';
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
            }
        }

        // ====================================================
        // EFEITO 2: FUNÇÃO DE ANIMAÇÃO DE NÚMEROS (VELOCÍMETRO)
        // ====================================================
        function animateCounter(element, start, end, duration, isCurrency) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Ease-out (desacelera no final)
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = progress * (end - start) + start;
                
                if(isCurrency) {
                    element.innerText = numFmt.format(current);
                } else {
                    element.innerText = current.toFixed(1) + '%';
                }
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    // Garante que termina exatamente no valor final
                    element.innerText = isCurrency ? numFmt.format(end) : end.toFixed(1) + '%';
                }
            };
            window.requestAnimationFrame(step);
        }

        // ====================================================
        // RENDERIZAÇÃO DA TELA
        // ====================================================
        function renderMetas() {
            const period = document.getElementById('period-filter').value;
            
            const now = new Date(); 
            let sDate = new Date(2000, 0, 1), eDate = new Date(2100, 0, 1);
            if (period === 'this_month') { sDate = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0); eDate = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59); } 
            else if (period === 'last_month') { sDate = new Date(now.getFullYear(), now.getMonth() - 1, 1, 0, 0, 0); eDate = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59); } 
            else if (period === 'this_year') { sDate = new Date(now.getFullYear(), 0, 1, 0, 0, 0); eDate = new Date(now.getFullYear(), 11, 31, 23, 59, 59); }

            const finalStage = configWorkflow.length > 0 ? getSafeStatus(configWorkflow[configWorkflow.length-1].name) : 'finalizado';
            const sellersMap = {};

            ordersData.forEach(o => {
                let sClean = String(o.sales || '').trim();
                let sLower = sClean.toLowerCase();
                
                if (!sClean || sClean === 'n/d' || sLower.includes('j7s') || sLower.includes('bruno') || sLower.includes('admin')) return;

                if(!sellersMap[sClean]) sellersMap[sClean] = { vendas: 0, faturado: 0 };

                let valStr = String(o.value || 0).replace(',', '.');
                const val = parseFloat(valStr) || 0;
                const st = getSafeStatus(o.status);
                const hist = o.history || [];

                let dVendaStr = o.issue_date || o.created_at;
                if (dVendaStr) {
                    if (dVendaStr.length === 10) dVendaStr += 'T12:00:00';
                    const dVenda = new Date(dVendaStr);
                    if (period === 'all' || (dVenda >= sDate && dVenda <= eDate)) {
                        sellersMap[sClean].vendas += val;
                    }
                }

                if (st === finalStage || st.includes('finaliz') || st.includes('entreg') || st.includes('fatur') || st.includes('conclu') || st.includes('fim')) {
                    let fatDate = null;
                    if (hist.length > 0) {
                        let fatLog = [...hist].reverse().find(h => {
                            const hTo = getSafeStatus(h.to);
                            const hAct = getSafeStatus(h.action);
                            return hTo === finalStage || hTo.includes('finaliz') || hTo.includes('entreg') || hTo.includes('fatur') || hTo.includes('conclu') || hTo.includes('fim') || hAct.includes('fatur') || hAct.includes('nota') || hAct.includes('conclu') || hAct.includes('fim');
                        });
                        if (!fatLog) fatLog = hist[hist.length - 1];
                        if (fatLog && fatLog.date) fatDate = new Date(fatLog.date);
                    }
                    if (!fatDate && dVendaStr) fatDate = new Date(dVendaStr);

                    if (fatDate && (period === 'all' || (fatDate >= sDate && fatDate <= eDate))) {
                        sellersMap[sClean].faturado += val;
                    }
                }
            });

            const sortedSellers = Object.entries(sellersMap).sort((a,b) => b[1][currentPerspective] - a[1][currentPerspective]);
            const container = document.getElementById('seller-list-container');

            if (sortedSellers.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted); font-size: 1.1rem; grid-column: 1 / -1;">Nenhuma métrica registada para a equipa neste período.</div>';
                return;
            }

            container.innerHTML = sortedSellers.map((s, index) => {
                const sellerName = s[0];
                const data = s[1];
                
                const mainValue = currentPerspective === 'vendas' ? data.vendas : data.faturado;
                const secValue = currentPerspective === 'vendas' ? data.faturado : data.vendas;
                const iconLabel = currentPerspective === 'vendas' ? 'Vendas Atuais' : 'Faturamento Atual';
                
                const mainIconClass = currentPerspective === 'vendas' ? 'ph-fire' : 'ph-wallet';
                const mainIconColor = currentPerspective === 'vendas' ? '#EF4444' : '#10B981';
                const mainIconGlow = currentPerspective === 'vendas' ? 'rgba(239, 68, 68, 0.8)' : 'rgba(16, 185, 129, 0.8)';
                
                let secBadgeHtml = '';
                if (currentPerspective === 'vendas') {
                    secBadgeHtml = `<div class="sec-badge fat"><i class="ph-bold ph-check-circle"></i> Faturado: ${moneyFmt.format(secValue)}</div>`;
                } else {
                    secBadgeHtml = `<div class="sec-badge venda"><i class="ph-bold ph-rocket-launch"></i> Venda: ${moneyFmt.format(secValue)}</div>`;
                }

                let milestonesHtml = '';
                let activeFound = false;

                MILESTONES.forEach(step => {
                    const targetValue = step * 1000;
                    let stateClass = 'pending';
                    let icon = '';
                    let isMinTarget = (step === 75) ? ' min-target' : '';

                    if (mainValue >= targetValue) {
                        stateClass = 'done';
                        icon = '<i class="ph-bold ph-check"></i>';
                    } else if (!activeFound) {
                        stateClass = 'active';
                        activeFound = true; 
                    }

                    milestonesHtml += `
                        <div class="milestone-item">
                            <div class="m-circle ${stateClass}${isMinTarget}">${icon}</div>
                            <div class="m-label${isMinTarget}">${step}k</div>
                        </div>
                    `;
                });

                let pctMain = (mainValue / META_IDEAL) * 100;
                let visualWidthMain = pctMain > 100 ? 100 : pctMain;

                // PREPARE ELEMENTOS PARA ANIMAÇÃO DE JS
                return `
                <div class="seller-widget" id="widget-${index}">
                    
                    <div class="widget-header">
                        <div class="fire-block">
                            <i class="ph-fill ${mainIconClass} fire-icon" style="color: ${mainIconColor}; filter: drop-shadow(0 0 10px ${mainIconGlow});"></i>
                            <div class="streak-info">
                                <div class="streak-label">${iconLabel}</div>
                                <div class="streak-val">
                                    <span class="anim-val" data-value="${mainValue}" style="color:var(--text); font-size:inherit; font-weight:inherit; text-transform:none;">0</span> 
                                    <span>/ 100.000</span>
                                </div>
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
                            <div class="seller-profile">
                                <div class="seller-avatar">${sellerName.charAt(0).toUpperCase()}</div>
                                <div class="seller-name" title="${sellerName}">${sellerName}</div>
                            </div>
                            ${secBadgeHtml}
                        </div>
                    </div>

                    <div class="milestones-container">
                        <div class="milestones-line"></div>
                        ${milestonesHtml}
                    </div>

                    <div class="exact-progress">
                        <div class="exact-header">
                            <div class="steps-label">Progresso Exato</div>
                            <div class="pct-label anim-pct" data-value="${pctMain}">0.0%</div>
                        </div>
                        <div class="progress-track">
                            <!-- EFEITO 3: BARRA FICA LARGA E PREENCHE -->
                            <div class="progress-fill" style="width: 0%" data-target="${visualWidthMain}%"></div>
                        </div>
                    </div>

                </div>
                `;
            }).join('');

            // ====================================================
            // EFEITO 1: CASCATA (Cards aparecem um a um) E INIT DE DADOS
            // ====================================================
            const widgets = document.querySelectorAll('.seller-widget');
            widgets.forEach((widget, index) => {
                
                // Delay para cada cartão baseado no seu índice (Cascata)
                setTimeout(() => {
                    widget.classList.add('show-anim');
                    
                    // Dispara a animação da barra de progresso
                    const bar = widget.querySelector('.progress-fill');
                    if(bar) bar.style.width = bar.getAttribute('data-target');

                    // Dispara a animação dos números girando
                    const valEl = widget.querySelector('.anim-val');
                    if(valEl) animateCounter(valEl, 0, Number(valEl.getAttribute('data-value')), 1200, true);
                    
                    const pctEl = widget.querySelector('.anim-pct');
                    if(pctEl) animateCounter(pctEl, 0, Number(pctEl.getAttribute('data-value')), 1200, false);

                }, index * 150); // 150ms de intervalo entre a exibição de cada cartão
            });
        }
    </script>
</body>
</html>
