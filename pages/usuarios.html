<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizadores | PMS J7S</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/core/sinaliza-core.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --cor-primaria: #2563EB; 
            --cor-primaria-hover: #1D4ED8;
            --cor-primaria-soft-bg: #EFF6FF;
            --cor-fundo: #F3F4F6; 
            --cor-card-bg: #FFFFFF; 
            --cor-panel-bg: #F9FAFB; 
            --cor-sidebar-bg: #1E3A8A; 
            --cor-sidebar-text: #E0E7FF;
            --cor-sidebar-hover: rgba(255, 255, 255, 0.1);
            --cor-borda: #E5E7EB;
            --cor-borda-hover: #D1D5DB;
            --cor-texto: #111827; 
            --cor-texto-mutado: #6B7280;
            --cor-input-bg: #FFFFFF;
            --cor-sucesso: #10B981; 
            --cor-erro: #EF4444; 
            --cor-alerta: #F59E0B; 
            
            --sombra-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --sombra-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --sombra-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --radius-padrao: 8px;
            --radius-card: 12px;
        }

        /* ========================================================= */
        /* 🌙 HIGH-END DARK MODE (Barra Azul + Preto OLED Absoluto)  */
        /* ========================================================= */
        [data-theme="dark"] {
            /* Fundo Preto "Vivo" (Neutro e profundo) */
            --cor-fundo: #000000; 
            --cor-card-bg: #111111; 
            --cor-panel-bg: #1A1A1A; 
            --cor-input-bg: #000000; 
            
            /* Mantendo a Barra Lateral Azul Original */
            --cor-sidebar-bg: #1E3A8A; 
            --cor-sidebar-text: #E0E7FF;
            --cor-sidebar-hover: rgba(255, 255, 255, 0.15);
            
            /* Textos Contrastantes */
            --cor-texto: #FFFFFF; 
            --cor-texto-mutado: #A1A1AA; 
            
            /* Bordas Translúcidas */
            --cor-borda: rgba(255, 255, 255, 0.12); 
            --cor-borda-hover: rgba(255, 255, 255, 0.25);
            
            /* Sombras ajustadas para fundo preto puro */
            --sombra-sm: 0 2px 4px 0 rgba(0, 0, 0, 0.8);
            --sombra-md: 0 4px 8px -1px rgba(0, 0, 0, 0.9), 0 2px 4px -1px rgba(0, 0, 0, 0.7);
            --sombra-lg: 0 15px 25px -5px rgba(0, 0, 0, 0.9), 0 8px 10px -6px rgba(0, 0, 0, 0.8);

            /* Badges e Alertas */
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning-bg: rgba(245, 158, 11, 0.15);
            
            /* Cores de texto das observações */
            --obs-com-text: #FDE68A;
            --obs-lay-text: #E9D5FF;
            --obs-pcp-text: #FDBA74;
            --obs-fat-text: #FDA4AF;
            
            /* Filtro de Logo */
            --filtro-logo-transportadora: brightness(0) invert(1) opacity(0.9);
        }
        
        /* 🚀 Tweaks de Iluminação para Cartões Pretos */
        [data-theme="dark"] .kpi-card, 
        [data-theme="dark"] .chart-card, 
        [data-theme="dark"] .config-panel, 
        [data-theme="dark"] .list-row,
        [data-theme="dark"] .modal-card,
        [data-theme="dark"] .report-card,
        [data-theme="dark"] .sales-toolbar {
            background: linear-gradient(145deg, var(--cor-card-bg) 0%, #080808 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), var(--sombra-md);
        }
        
        /* Tabelas no Modo Escuro */
        [data-theme="dark"] table th {
            background: #000000; 
            border-bottom: 1px solid var(--cor-borda);
        }

        /* Destaque suave ao passar o rato nos cartões (List-row) */
        [data-theme="dark"] .list-row:hover {
            background: linear-gradient(145deg, #1A1A1A 0%, #0A0A0A 100%);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Efeito vermelho suave para pedidos retornados/atrasados */
        [data-theme="dark"] .list-row.is-retorno,
        [data-theme="dark"] .list-row.late {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.12) 0%, rgba(239, 68, 68, 0.04) 100%) !important;
            border-color: rgba(239, 68, 68, 0.4) !important;
        }
        
        /* Efeito escavado nos Inputs */
        [data-theme="dark"] input, 
        [data-theme="dark"] select, 
        [data-theme="dark"] textarea {
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; outline:none; transition: background-color 0.2s, border-color 0.2s; }
        body { background: var(--cor-fundo); color: var(--cor-texto); display: flex; font-size: 14px; min-height: 100vh; overflow-x: hidden; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========================================================= */
        /* SIDEBAR PADRÃO OURO                                       */
        /* ========================================================= */
        aside { width: 260px; min-width: 260px; background: var(--cor-sidebar-bg); display: flex; flex-direction: column; padding: 24px 20px; z-index: 100; box-shadow: var(--sombra-md); position: fixed; height: 100vh; top: 0; left: 0;}
        
        .logo-area { margin-bottom: 35px; display: flex; align-items: center; gap: 12px; padding-left: 5px;}
        .logo-icon { width: 34px; height: 34px; background: #FFFFFF; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--cor-sidebar-bg); font-size: 1.5rem;}
        .logo-text { color: #FFFFFF; font-weight: 900; font-size: 1.4rem; letter-spacing: 0.5px; }

        nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .nav-btn { background: transparent; color: var(--cor-sidebar-text); border: none; padding: 12px 16px; width: 100%; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: background 0.2s;}
        .nav-btn i { font-size: 1.3rem; }
        .nav-btn:hover { background: var(--cor-sidebar-hover); color: #FFFFFF; }
        .nav-btn.active { background: #FFFFFF; color: var(--cor-sidebar-bg); font-weight: 800; box-shadow: var(--sombra-sm); }
        .nav-btn.active i { color: var(--cor-sidebar-bg); }

        .bottom-actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
        .action-btn { background: transparent; color: var(--cor-sidebar-text); border: none; padding: 12px 16px; width: 100%; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: background 0.2s;}
        .action-btn i { font-size: 1.3rem; }
        .action-btn:hover { background: var(--cor-sidebar-hover); color: #FFFFFF; }
        
        .logout-btn { background: rgba(0, 0, 0, 0.15); color: #FDA4AF; border: none; padding: 12px 16px; width: 100%; border-radius: 10px; cursor: pointer; text-align: left; font-weight: 700; display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: all 0.2s; margin-top: 10px;}
        .logout-btn i { font-size: 1.3rem; }
        .logout-btn:hover { background: rgba(225, 29, 72, 0.8); color: #FFFFFF; }

        /* ========================================================= */
        /* MAIN CONTENT                                              */
        /* ========================================================= */
        main { flex: 1; padding: 30px 40px; margin-left: 260px; overflow-y: auto;}
        
        .page-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px; gap: 20px; flex-wrap: wrap; border-bottom: 1px solid var(--cor-borda); padding-bottom: 20px;}
        .page-header h1 { font-weight: 900; font-size: 2rem; color: var(--cor-texto); letter-spacing: -0.04em; line-height: 1.1; }
        .page-header p { color: var(--cor-texto-mutado); font-size: 0.95rem; margin-top: 6px; font-weight: 500; }
        
        .status-badge-top { background: var(--cor-card-bg); border: 1px solid var(--cor-borda); padding:6px 12px; border-radius:9999px; display:flex; align-items:center; gap:8px; font-weight:600; font-size:0.8rem; color:var(--cor-texto); box-shadow: var(--sombra-sm); }
        .status-badge-top.online i { color: var(--cor-sucesso); }

        .btn { padding:10px 18px; border-radius:var(--radius-padrao); font-weight:600; border:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px; font-size: 0.85rem; height: 40px; box-shadow: var(--sombra-sm);}
        .btn-primary { background: var(--cor-primaria); color: white; border: 1px solid transparent;}
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: var(--sombra-md); }
        .btn-secondary { background: var(--cor-card-bg); color: var(--cor-texto); border: 1px solid var(--cor-borda);}
        .btn-secondary:hover { background: var(--cor-panel-bg); }
        .btn-danger { background: var(--cor-erro); color: white; }
        .btn-icon-only { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-padrao);}

        .table-responsive-container { width: 100%; overflow-x: auto; border-radius: var(--radius-padrao); border: 1px solid var(--cor-borda); background: var(--cor-card-bg); box-shadow: var(--sombra-sm); margin-bottom: 20px;}
        .config-table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: left; }
        .config-table th { background: var(--cor-panel-bg); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--cor-texto-mutado); padding: 15px 20px; border-bottom: 1px solid var(--cor-borda);}
        .config-table td { padding: 15px 20px; border-bottom: 1px solid var(--cor-borda); color:var(--cor-texto); vertical-align: middle; font-weight: 500; font-size: 0.95rem; }
        .config-table tr:last-child td { border-bottom: none; }
        .config-table tbody tr:hover { background: var(--cor-panel-bg); }

        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-active { background: var(--cor-primaria-soft-bg); color: var(--cor-primaria); }

        /* MODAIS */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(17, 24, 39, 0.6); z-index:1000; display:none; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
        .modal-card { background:var(--cor-card-bg); width:100%; max-width:450px; padding:30px; border-radius:var(--radius-card); box-shadow:var(--sombra-lg); border: 1px solid var(--cor-borda); color: var(--cor-texto); animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.97) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .config-input, select { width: 100%; padding: 12px 14px; font-size: 0.95rem; font-weight: 500; background: var(--cor-input-bg); border: 1px solid var(--cor-borda); border-radius: var(--radius-padrao); color: var(--cor-texto); margin-bottom: 20px; outline: none;}
        .config-input:focus, select:focus { border-color: var(--cor-primaria); box-shadow: 0 0 0 3px var(--cor-primaria-soft-bg); }
    </style>
</head>
<body>
    
    <aside>
        <div class="logo-area">
            <div class="logo-icon"><i class="ph-bold ph-hexagon"></i></div>
            PMS J7S
        </div>
        
        <nav style="flex:1;">
            <button class="nav-btn" onclick="window.location.href='admin.html'">
                <i class="ph-fill ph-squares-four" style="font-size: 1.4rem;"></i> Visão Geral
            </button>
            
            <button class="nav-btn" onclick="window.location.href='dashboard-comercial.html'">
                <i class="ph-fill ph-briefcase" style="font-size: 1.4rem;"></i> Gestão Comercial
            </button>
            
            <button class="nav-btn" onclick="window.location.href='relatorios.html'">
                <i class="ph-fill ph-chart-line-up" style="font-size: 1.4rem;"></i> Relatórios Master
            </button>
            
            <button class="nav-btn" onclick="window.location.href='gargalos.html'">
                <i class="ph-fill ph-magnifying-glass" style="font-size: 1.4rem;"></i> Análise de Gargalos
            </button>
            
            <button class="nav-btn" onclick="window.location.href='usuarios.html'">
                <i class="ph-fill ph-users" style="font-size: 1.4rem;"></i> Utilizadores
            </button>
            
            <button class="nav-btn" onclick="window.location.href='configuracoes.html'">
                <i class="ph-fill ph-gear" style="font-size: 1.4rem;"></i> Configurações
            </button>
        </nav>
        
        <div class="bottom-actions">
            <button onclick="toggleTheme()" class="nav-btn" style="margin-bottom: 10px;">
                <i id="theme-icon" class="ph-fill ph-moon" style="font-size: 1.4rem;"></i> <span id="theme-text">Modo Escuro</span>
            </button>
            <button onclick="logout()" class="logout-btn">
                <i class="ph-bold ph-sign-out" style="font-size: 1.4rem;"></i> Sair do Sistema
            </button>
        </div>
    </aside>

    <main>
        <div class="page-header">
            <div>
                <h1>Controlo de Acesso e Utilizadores</h1>
                <p>Faça a gestão de permissões, logins e senhas da equipa.</p>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="btn btn-primary" onclick="openUserModal()"><i class="ph-bold ph-user-plus"></i> Novo Utilizador</button>
            </div>
        </div>

        <div class="table-responsive-container">
            <table class="config-table">
                <thead>
                    <tr>
                        <th>Utilizador (Login)</th>
                        <th>Palavra-passe</th>
                        <th>Permissão (Role)</th>
                        <th style="width: 120px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                    <tr><td colspan="4" style="text-align:center; padding: 40px; color:var(--cor-texto-mutado);"><i class="ph-bold ph-spinner ph-spin" style="font-size:2rem;"></i></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="userModal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-bottom:25px; font-weight: 800; font-size: 1.4rem; display:flex; align-items:center; gap:10px;"><i class="ph-fill ph-user-circle" style="color:var(--cor-primaria)"></i> Dados do Utilizador</h3>
            
            <label style="font-size:0.85rem; font-weight:700; margin-bottom: 6px; display: block; color:var(--cor-texto-mutado);">Login de Acesso</label>
            <input type="text" id="u-name" class="config-input" placeholder="Ex: anderson">
            
            <label style="font-size:0.85rem; font-weight:700; margin-bottom: 6px; display: block; color:var(--cor-texto-mutado);">Palavra-passe</label>
            <input type="password" id="u-pass" class="config-input" placeholder="••••••••">
            
            <label style="font-size:0.85rem; font-weight:700; margin-bottom: 6px; display: block; color:var(--cor-texto-mutado);">Setor / Nível de Permissão</label>
            <select id="u-role" class="config-input" style="margin-bottom: 30px;">
                <option value="admin">Admin / Gestão</option>
                <option value="pcp">PCP (Liberação)</option>
                <option value="layout">Layout (Criação)</option>
                <option value="producao">Produção (Fábrica)</option>
                <option value="faturamento">Emissão (Faturamento)</option>
                <option value="comercial">Comercial (Vendas)</option>
                <option value="tv">TV Monitor (Apenas Leitura)</option>
            </select>
            
            <input type="hidden" id="u-original"> 
            
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn btn-secondary" onclick="document.getElementById('userModal').style.display='none'">Cancelar</button>
                <button class="btn btn-primary" onclick="saveUser()">Guardar Utilizador</button>
            </div>
        </div>
    </div>

    <script>
        // ====================================================
        // 🔒 SESSÃO & CORE
        // ====================================================
        const sessaoString = localStorage.getItem('sinaliza_sessao');
        let currentUser = null;
        let currentRole = null;

        if (!sessaoString) { window.location.href = 'index.html'; } 
        else {
            try {
                const sessaoData = JSON.parse(sessaoString);
                currentUser = sessaoData.username;
                currentRole = sessaoData.role;
                if(currentRole !== 'admin') window.location.href = 'index.html'; // Proteção extra
            } catch(e) { logout(); }
        }

        function logout() { localStorage.removeItem('sinaliza_sessao'); window.location.href = 'index.html'; }
        
        const API_URL = '/api';
        let usersData = [];

        async function apiFetch(endpoint, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${API_URL}${endpoint}`, options);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || err.message || `Erro HTTP: ${res.status}`);
            }
            return res.json();
        }

        window.onload = () => {
            loadTheme();
            loadUsers();
        };

        // ====================================================
        // GESTÃO DE UTILIZADORES
        // ====================================================
        async function loadUsers() { 
            try {
                const data = await apiFetch('/usuarios'); 
                usersData = data.map(u => ({ user: u.USERNAME || u.username, pass: u.PASSWORD || u.password, role: u.ROLE || u.role })); 
                
                document.getElementById('users-body').innerHTML = usersData.map((u, i) => `
                    <tr>
                        <td style="font-weight:800; color:var(--cor-texto); font-size:1.05rem;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div style="width:32px; height:32px; background:var(--cor-primaria-soft-bg); color:var(--cor-primaria); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem;">${String(u.user).charAt(0).toUpperCase()}</div>
                                ${u.user}
                            </div>
                        </td>
                        <td>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span id="pass-${i}" data-pass="${u.pass}" style="color:var(--cor-texto-mutado); font-family:monospace; font-size:1.1rem; letter-spacing:2px;">••••••••</span>
                                <button onclick="togglePassword(${i})" style="background:none;border:none;cursor:pointer;color:var(--cor-texto-mutado); display:flex; align-items:center;"><i id="icon-${i}" class="ph-bold ph-eye" style="font-size:1.2rem;"></i></button>
                            </div>
                        </td>
                        <td><span class="status-badge badge-active">${String(u.role).toUpperCase()}</span></td>
                        <td>
                            <div style="display:flex; gap: 8px;">
                                <button class="btn btn-secondary btn-icon-only" onclick="openUserModal('${u.user}')" title="Editar"><i class="ph-bold ph-pencil-simple"></i></button>
                                ${u.user.toLowerCase() !== 'admin' ? `<button class="btn btn-danger btn-icon-only" onclick="deleteUser('${u.user}')" title="Excluir"><i class="ph-bold ph-trash"></i></button>` : ''}
                            </div>
                        </td>
                    </tr>
                `).join(''); 
            } catch(e) { 
                console.error("Erro ao carregar usuários", e); 
                document.getElementById('users-body').innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--cor-erro); padding:20px;">Falha ao carregar utilizadores.</td></tr>`;
            }
        }

        function togglePassword(index) {
            const span = document.getElementById('pass-' + index);
            const icon = document.getElementById('icon-' + index);
            if (span && icon) {
                if (span.innerText === '••••••••') {
                    span.innerText = span.getAttribute('data-pass');
                    span.style.letterSpacing = 'normal';
                    span.style.fontFamily = 'inherit';
                    span.style.fontWeight = '700';
                    icon.className = 'ph-bold ph-eye-slash';
                } else {
                    span.innerText = '••••••••';
                    span.style.letterSpacing = '2px';
                    span.style.fontFamily = 'monospace';
                    span.style.fontWeight = 'normal';
                    icon.className = 'ph-bold ph-eye';
                }
            }
        }

        function openUserModal(u) { 
            const m = document.getElementById('userModal'); 
            m.style.display = 'flex'; 
            if(u) {
                const d = usersData.find(x => x.user === u);
                document.getElementById('u-name').value = d.user;
                document.getElementById('u-pass').value = d.pass;
                document.getElementById('u-role').value = d.role;
                document.getElementById('u-original').value = d.user;
            } else {
                document.getElementById('u-name').value = '';
                document.getElementById('u-pass').value = '';
                document.getElementById('u-role').value = 'comercial';
                document.getElementById('u-original').value = '';
            } 
        }

        async function saveUser() { 
            const originalUser = document.getElementById('u-original').value; 
            const newUser = document.getElementById('u-name').value.trim(); 
            const newPass = document.getElementById('u-pass').value.trim(); 
            const newRole = document.getElementById('u-role').value; 
            if (!newUser || !newPass) return Swal.fire('Aviso', 'Preencha login e palavra-passe.', 'warning'); 
            
            try { 
                if (originalUser && originalUser !== newUser) { 
                    await apiFetch(`/usuarios/${originalUser}`, 'DELETE'); 
                } 
                await apiFetch('/usuarios', 'POST', { username: newUser, password: newPass, role: newRole }); 
                
                Swal.fire({toast:true, position:'top-end', icon:'success', title:'Guardado!', showConfirmButton:false, timer:2000}); 
                document.getElementById('userModal').style.display='none'; 
                loadUsers(); 
            } catch (e) { Swal.fire('Erro', "Erro ao guardar: " + e.message, 'error'); } 
        }

        async function deleteUser(u) { 
            Swal.fire({title:'Excluir utilizador?', text: `Deseja apagar o acesso de ${u}?`, icon:'warning', showCancelButton:true, confirmButtonColor: '#EF4444', confirmButtonText: 'Excluir', cancelButtonText: 'Cancelar'}).then(async r => {
                if(r.isConfirmed) { 
                    try {
                        await apiFetch(`/usuarios/${u}`, 'DELETE'); 
                        Swal.fire({toast:true, position:'top-end', icon:'success', title:'Excluído com sucesso.', showConfirmButton:false, timer:2000});
                        loadUsers(); 
                    } catch(e) { Swal.fire('Erro', e.message, 'error'); }
                }
            }); 
        }

        // ====================================================
        // TEMA E SENHA PRÓPRIA
        // ====================================================
        function toggleTheme() { const b=document.body; const c=b.getAttribute('data-theme'); const n=c==='dark'?'light':'dark'; b.setAttribute('data-theme',n); localStorage.setItem('theme',n); updateThemeIcon(n); }
        function loadTheme() { const t=localStorage.getItem('theme')||'light'; document.body.setAttribute('data-theme',t); updateThemeIcon(t); }
        function updateThemeIcon(t) { const i=document.getElementById('theme-icon'); const txt=document.getElementById('theme-text'); if(t==='dark'){i.className='ph-fill ph-sun';txt.innerText='Modo Claro';}else{i.className='ph-fill ph-moon';txt.innerText='Modo Escuro';} }

    </script>
</body>
