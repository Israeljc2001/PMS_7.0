<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountability Master | PMS J7S</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="../assets/js/core/sinaliza-core.js"></script>
    <script src="../assets/js/core/shared-report.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            /* HIGH-END DEEP SPACE & NEON */
            --bg: #070B14; 
            --primary: #3B82F6;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            
            /* NEON SETORES */
            --c-lay: #D946EF; --c-lay-bg: rgba(217, 70, 239, 0.05); --c-lay-glow: rgba(217, 70, 239, 0.4);
            --c-pcp: #F59E0B; --c-pcp-bg: rgba(245, 158, 11, 0.05); --c-pcp-glow: rgba(245, 158, 11, 0.4);
            --c-prod: #06B6D4; --c-prod-bg: rgba(6, 182, 212, 0.05); --c-prod-glow: rgba(6, 182, 212, 0.4);
            --c-fat: #10B981; --c-fat-bg: rgba(16, 185, 129, 0.05); --c-fat-glow: rgba(16, 185, 129, 0.4);
            
            --danger: #EF4444;

            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
        
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 58, 138, 0.15), transparent 60%);
            color: var(--text); display: flex; font-size: 14px; min-height: 100vh; overflow-x: hidden; 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* ========================================================= */
        /* GLASSMORPHISM BASE CLASS                                  */
        /* ========================================================= */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-lg);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* ========================================================= */
        /* SIDEBAR                                                   */
        /* ========================================================= */
        aside { 
            width: 260px; min-width: 260px; background: transparent; 
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; 
            padding: 24px 20px; z-index: 100; position: fixed; height: 100vh; top: 0; left: 0;
        }
        
        .logo-area { margin-bottom: 45px; display: flex; align-items: center; gap: 12px; padding-left: 5px;}
        .logo-icon { 
            width: 38px; height: 38px; background: linear-gradient(135deg, #1D4ED8, #3B82F6); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            color: #FFF; font-size: 1.6rem; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        .logo-text { font-weight: 900; font-size: 1.4rem; letter-spacing: 0.5px; }

        nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-btn { 
            background: transparent; color: var(--text-muted); border: none; padding: 14px 18px; 
            width: 100%; border-radius: 50px; cursor: pointer; text-align: left; font-weight: 600; 
            display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: 0.3s;
        }
        .nav-btn i { font-size: 1.3rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-btn.active { 
            background: linear-gradient(to right, rgba(59, 130, 246, 0.15), transparent); 
            color: var(--primary); border-left: 3px solid var(--primary); 
            border-radius: 0 50px 50px 0; padding-left: 15px;
        }

        .bottom-actions { margin-top: auto; display: flex; flex-direction: column; gap: 6px; }
        .logout-btn { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 14px 18px; width: 100%; border-radius: 50px; cursor: pointer; text-align: left; 
            font-weight: 700; display: flex; align-items: center; gap: 14px; font-size: 0.95rem; transition: 0.3s;
        }

        /* ========================================================= */
        /* HEADER & CONTENT                                          */
        /* ========================================================= */
        main { flex: 1; padding: 30px 40px; margin-left: 260px; overflow-y: auto;}
        
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; gap: 20px; flex-wrap: wrap;}
        .page-header h1 { font-weight: 900; font-size: 2.2rem; letter-spacing: -0.02em; line-height: 1.1; display: flex; align-items: center; gap: 12px;}
        .page-header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; font-weight: 500; }

        .btn-primary { 
            background: linear-gradient(135deg, #1D4ED8, #3B82F6); color: #FFF; 
            padding: 12px 24px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; 
            display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.6); }

        /* ========================================================= */
        /* NAVEGADOR DE SETORES (TABS)                               */
        /* ========================================================= */
        .tabs-container {
            display: flex; gap: 15px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 8px; 
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); width: fit-content;
        }
        .tab-btn {
            padding: 10px 24px; border-radius: 50px; font-weight: 800; font-size: 0.9rem;
            color: var(--text-muted); background: transparent; border: 1px solid transparent;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 8px;
        }
        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        
        .tab-btn.active.t-lay { background: rgba(217, 70, 239, 0.15); color: var(--c-lay); border-color: var(--c-lay); box-shadow: 0 0 15px var(--c-lay-glow); }
        .tab-btn.active.t-pcp { background: rgba(245, 158, 11, 0.15); color: var(--c-pcp); border-color: var(--c-pcp); box-shadow: 0 0 15px var(--c-pcp-glow); }
        .tab-btn.active.t-prod { background: rgba(6, 182, 212, 0.15); color: var(--c-prod); border-color: var(--c-prod); box-shadow: 0 0 15px var(--c-prod-glow); }
        .tab-btn.active.t-fat { background: rgba(16, 185, 129, 0.15); color: var(--c-fat); border-color: var(--c-fat); box-shadow: 0 0 15px var(--c-fat-glow); }

        /* ========================================================= */
        /* CONTEÚDO DA TAB ATIVA                                     */
        /* ========================================================= */
        .sector-view {
            display: none; opacity: 0; transform: translateY(20px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
        .sector-view.show { display: grid; opacity: 1; transform: translateY(0); grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 1200px) { .sector-view.show { grid-template-columns: 1fr; } }

        .dynamic-glow {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 300px; border-radius: 50%; filter: blur(100px); z-index: -1;
            opacity: 0.15; transition: background 0.5s; pointer-events: none;
        }

        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .kpi-box { padding: 25px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;}
        
        .kpi-label { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .kpi-val { font-size: 2.5rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; display: flex; align-items: baseline; gap: 5px;}
        .kpi-val span { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: lowercase;}

        .chart-box { padding: 25px; }
        .chart-title { font-size: 1rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; margin-bottom: 20px;}

        .ranking-box { padding: 25px; display: flex; flex-direction: column;}
        .ranking-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px;}
        
        .rank-row { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: rgba(0,0,0,0.3); border-radius: var(--radius-md); 
            border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .rank-row:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); }

        .rank-pos { font-size: 1.2rem; font-weight: 900; color: var(--text-muted); width: 25px; text-align: center;}
        
        .r-avatar { 
            width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: 900; border: 2px solid; color: #FFF; background: rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .r-info { flex: 1; }
        .r-name { font-weight: 900; font-size: 1.1rem; color: var(--text); text-transform: uppercase;}
        .r-deliveries { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
        
        .r-time { text-align: right; }
        .r-time-val { font-size: 1.2rem; font-weight: 900; }
        .r-time-lbl { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;}

        .rank-row.pos-1 { border-color: rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.05); }
        .rank-row.pos-1 .rank-pos { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    </style>
</head>
<body>
    
    <div class="dynamic-glow" id="dynamic-glow"></div>

    <aside>
        <div class="logo-area">
            <div class="logo-icon"><i class="ph-bold ph-hexagon"></i></div>
            <span class="logo-text">PMS J7S</span>
        </div>
        
        <nav style="flex:1;">
            <button class="nav-btn" onclick="window.location.href='diretoria.html'">
                <i class="ph-fill ph-presentation-chart"></i> Painel Diretoria
            </button>
            <button class="nav-btn" onclick="window.location.href='metas-comercial.html'">
                <i class="ph-fill ph-target"></i> Metas Comerciais
            </button>
            <button class="nav-btn" onclick="window.location.href='monitoramento-executivo.html'">
                <i class="ph-fill ph-radar"></i> Rastreio de Pedidos
            </button>
            <button class="nav-btn" onclick="window.location.href='gargalos.html'">
                <i class="ph-fill ph-funnel-x"></i> Análise de Gargalos
            </button>
            <button class="nav-btn active" onclick="return false;">
                <i class="ph-fill ph-users-three"></i> Ranking da Equipa
            </button>
            <button class="nav-btn" onclick="window.location.href='admin.html'">
                <i class="ph-fill ph-squares-four"></i> Visão Operacional
            </button>
        </nav>
        
        <div class="bottom-actions">
            <button onclick="logout()" class="logout-btn">
                <i class="ph-bold ph-sign-out"></i> Sair do Sistema
            </button>
        </div>
    </aside>

    <main>
        <div class="page-header">
            <div>
                <h1><i class="ph-fill ph-users-three" style="color: var(--primary);"></i> Accountability & Performance</h1>
                <p>O tempo de espera e execução é integralmente atribuído a quem resolve e entrega o projeto.</p>
            </div>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-primary" onclick="loadData()" id="btn-sync">
                    <i class="ph-bold ph-arrows-clockwise"></i> Atualizar Dados
                </button>
            </div>
        </div>

        <div id="loading-state" style="text-align: center; padding: 100px; color: var(--text-muted);">
            <i class="ph-bold ph-spinner ph-spin" style="font-size: 4rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Auditando Históricos...</h2>
            <p>Atribuindo tempo de espera e execução à equipa responsável.</p>
        </div>

        <div id="dashboard-content" style="display: none; flex-direction: column;">
            
            <div class="tabs-container">
                <button class="tab-btn t-lay active" onclick="switchTab('lay')"><i class="ph-fill ph-paint-brush"></i> Layout</button>
                <button class="tab-btn t-pcp" onclick="switchTab('pcp')"><i class="ph-fill ph-clipboard-text"></i> PCP</button>
                <button class="tab-btn t-prod" onclick="switchTab('prod')"><i class="ph-fill ph-hammer"></i> Fábrica</button>
                <button class="tab-btn t-fat" onclick="switchTab('fat')"><i class="ph-fill ph-receipt"></i> Emissão</button>
            </div>

            <div id="active-sector-container">
                <!-- Gerado via JS -->
            </div>

        </div>
    </main>

    <script>
        // =========================================================================
        // 🔒 CONTROLE DE SESSÃO E DADOS
        // =========================================================================
        const sessaoString = localStorage.getItem('sinaliza_sessao');
        if (!sessaoString) window.location.href = 'index.html';
        function logout() { localStorage.removeItem('sinaliza_sessao'); window.location.href = 'index.html'; }

        // =========================================================================
        // WHITELIST DA EQUIPA OFICIAL (MANTIDA DO ARQUIVO ORIGINAL)
        // =========================================================================
        const TEAM_LAY  = ['CHRYS', 'LUCAS', 'ANA'];
        const TEAM_PCP  = ['BRENO'];
        const TEAM_PROD = ['ANDERSON'];
        const TEAM_FAT  = ['SORAIA'];

        // Conversor de Tempo Inteligente (Acima de 24h exibe Dias e Horas)
        function formatTimeExec(mins) {
            if (!mins || isNaN(mins) || mins < 1) return { val: '0', unit: 'm' };
            if (mins >= 1440) {
                const d = Math.floor(mins / 1440);
                const h = Math.floor((mins % 1440) / 60);
                return { val: `${d}d ${h}h`, unit: 'dias' };
            }
            if (mins >= 60) {
                const h = Math.floor(mins / 60);
                const m = Math.floor(mins % 60);
                return { val: `${h}h ${m}m`, unit: 'horas' };
            }
            return { val: `${Math.round(mins)}`, unit: 'm' };
        }

        function getFriendlyMonth(monthKey) {
            if (!monthKey) return '';
            const parts = monthKey.split('-');
            const date = new Date(parts[0], parseInt(parts[1]) - 1, 1);
            return date.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }).replace(' de ', '/');
        }

        // ====================================================
        // ANIMAÇÃO DE NÚMEROS (VELOCÍMETRO)
        // ====================================================
        function animateCounter(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (end - start) + start;
                
                element.innerText = Math.round(current);
                
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerText = Math.round(end);
            };
            window.requestAnimationFrame(step);
        }

        let ordersData = [];
        let configWorkflow = [];
        let globalStats = null;
        let activeTab = 'lay';
        let apexChart = null;

        window.onload = async () => { await loadData(); };

        async function loadData() {
            const btn = document.getElementById('btn-sync');
            if(btn) btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Auditando...';
            
            document.getElementById('loading-state').style.display = 'block';
            document.getElementById('dashboard-content').style.display = 'none';

            try {
                const { workflow, orders } = await fetchWorkflowAndOrders();
                configWorkflow = workflow;
                
                if (orders) {
                    ordersData = orders.map(o => ({
                        id: o.ID || o.id,
                        status: o.STATUS || o.status,
                        history: parseOrderHistory(o.HISTORY || o.history),
                        created_at: o.CREATED_AT || o.created_at || o.DATA_EMISSAO
                    }));
                    processReportsData();
                }
            } catch(e) {
                console.error("Erro:", e);
                Swal.fire('Falha', 'Não foi possível carregar os dados.', 'error');
            } finally {
                if(btn) btn.innerHTML = '<i class="ph-bold ph-arrows-clockwise"></i> Atualizar Dados';
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'flex';
            }
        }

        // =========================================================================
        // MOTOR DE LEAD TIME INTEGRAL (A MATEMÁTICA EXATA DO relatorios_2.html)
        // =========================================================================
        function processReportsData() {
            // Removido o filtro de período global para processar todo o histórico (igual ao script original)

            const finalStage = configWorkflow.length > 0 ? getSafeStatus(configWorkflow[configWorkflow.length-1].name) : 'finalizado';
            const layStages = configWorkflow.filter(w => getSafeStatus(w.role).includes('layout') || getSafeStatus(w.name).includes('layout')).map(w => getSafeStatus(w.name));
            const pcpStages = configWorkflow.filter(w => getSafeStatus(w.role).includes('pcp') || getSafeStatus(w.name).includes('pcp')).map(w => getSafeStatus(w.name));
            const prodStages = configWorkflow.filter(w => { const r = getSafeStatus(w.role); return r.includes('produc') || r.includes('produç'); }).map(w => getSafeStatus(w.name));
            const fatStages = configWorkflow.filter(w => getSafeStatus(w.role).includes('faturamento') || getSafeStatus(w.name).includes('faturam')).map(w => getSafeStatus(w.name));

            const agora = new Date();

            globalStats = {
                lay: { id: 'lay', name: 'Layout e Arte', color: 'var(--c-lay)', shadow: 'var(--c-lay-glow)', users: {}, monthly: {}, totalTime: 0, count: 0 },
                pcp: { id: 'pcp', name: 'PCP e Liberação', color: 'var(--c-pcp)', shadow: 'var(--c-pcp-glow)', users: {}, monthly: {}, totalTime: 0, count: 0 },
                prod: { id: 'prod', name: 'Fábrica e Expedição', color: 'var(--c-prod)', shadow: 'var(--c-prod-glow)', users: {}, monthly: {}, totalTime: 0, count: 0 },
                fat: { id: 'fat', name: 'Emissão e Faturamento', color: 'var(--c-fat)', shadow: 'var(--c-fat-glow)', users: {}, monthly: {}, totalTime: 0, count: 0 }
            };
            
            // Pré-carrega a equipa
            TEAM_LAY.forEach(n => globalStats.lay.users[n] = { time: 0, count: 0 });
            TEAM_PCP.forEach(n => globalStats.pcp.users[n] = { time: 0, count: 0 });
            TEAM_PROD.forEach(n => globalStats.prod.users[n] = { time: 0, count: 0 });
            TEAM_FAT.forEach(n => globalStats.fat.users[n] = { time: 0, count: 0 });

            ordersData.forEach(o => {
                const logs = o.history || [];
                if(logs.length === 0) return;
                
                const revLogs = [...logs].reverse();
                
                // 1. Deteção rigorosa de quem entregou
                let layDeliverer = null;
                const lLog = revLogs.find(h => {
                    const act = String(h.action).toLowerCase();
                    const toStatus = getSafeStatus(h.to);
                    const isFinishing = act.includes('finalizad') || act.includes('arte finalizada') || act.includes('concluid') || act.includes('cliente aprovou') || act.includes('encaminhad');
                    const isMovingOut = toStatus !== '' && !layStages.includes(toStatus);
                    const isReturn = act.includes('retorno') || act.includes('reprov');
                    return TEAM_LAY.includes(normalizarNome(h.user)) && (isFinishing || isMovingOut) && !isReturn;
                });
                if (lLog) layDeliverer = normalizarNome(lLog.user);

                let prodDeliverer = null;
                const prLog = revLogs.find(h => {
                    const act = String(h.action).toLowerCase();
                    const toStatus = getSafeStatus(h.to);
                    const isFinishing = act.includes('finalizad') || act.includes('concluid');
                    const isMovingOut = toStatus !== '' && !prodStages.includes(toStatus);
                    const isReturn = act.includes('retorno') || act.includes('reprov');
                    return TEAM_PROD.includes(normalizarNome(h.user)) && (isFinishing || isMovingOut) && !isReturn;
                });
                if (prLog) prodDeliverer = normalizarNome(prLog.user);

                let pcpDeliverer = null;
                const pcLog = revLogs.find(h => {
                    const act = String(h.action).toLowerCase();
                    const toStatus = getSafeStatus(h.to);
                    const isFinishing = act.includes('liberad') || act.includes('avanço') || act.includes('concluid');
                    const isMovingOut = toStatus !== '' && !pcpStages.includes(toStatus);
                    const isReturn = act.includes('retorno') || act.includes('reprov');
                    return TEAM_PCP.includes(normalizarNome(h.user)) && (isFinishing || isMovingOut) && !isReturn;
                });
                if (pcLog) pcpDeliverer = normalizarNome(pcLog.user);

                let fatDeliverer = null;
                const ftLog = revLogs.find(h => {
                    const act = String(h.action).toLowerCase();
                    const toStatus = getSafeStatus(h.to);
                    const isFinishing = act.includes('faturad') || act.includes('nota') || act.includes('finalizad');
                    const isMovingOut = toStatus === finalStage || (toStatus !== '' && !fatStages.includes(toStatus));
                    const isReturn = act.includes('retorno') || act.includes('reprov');
                    return TEAM_FAT.includes(normalizarNome(h.user)) && (isFinishing || isMovingOut) && !isReturn;
                });
                if (ftLog) fatDeliverer = normalizarNome(ftLog.user);

                // 2. Acumular tempo
                let orderTimeLay = 0, orderTimeProd = 0, orderTimePcp = 0, orderTimeFat = 0;
                let lastDate = new Date(o.created_at || o.DATA_EMISSAO);
                if (isNaN(lastDate.getTime()) && logs.length > 0) lastDate = new Date(logs[0].date);

                let currentStatus = '';
                if (logs.length > 0) currentStatus = getSafeStatus(logs[0].from) || getSafeStatus(logs[0].to);
                else currentStatus = getSafeStatus(o.status);

                logs.forEach(log => {
                    const logDate = new Date(log.date);
                    if (isNaN(logDate.getTime()) || logDate < lastDate) return;
                    
                    const dm = diffMinsCalc(lastDate, logDate);
                    if (dm > 0 && dm < 43200) {
                        if (layStages.includes(currentStatus)) orderTimeLay += dm;
                        else if (prodStages.includes(currentStatus)) orderTimeProd += dm;
                        else if (pcpStages.includes(currentStatus) || currentStatus.includes('pcp') || currentStatus.includes('libera')) orderTimePcp += dm;
                        else if (fatStages.includes(currentStatus) || currentStatus.includes('faturam')) orderTimeFat += dm;
                    }
                    const logTo = getSafeStatus(log.to);
                    if (logTo) currentStatus = logTo;
                    lastDate = logDate;
                });

                // Fatia Final
                const st = getSafeStatus(o.status);
                const isFin = st === finalStage || st.includes('finalizad') || st.includes('concluid') || st.includes('entregue') || logs.some(h => String(h.action).toLowerCase().includes('nota emitida'));
                const endTime = isFin ? (logs.length > 0 ? new Date(logs[logs.length-1].date) : new Date(o.created_at)) : agora;

                const finalDm = diffMinsCalc(lastDate, endTime);
                if (finalDm > 0 && finalDm < 43200) {
                    if (layStages.includes(currentStatus)) orderTimeLay += finalDm;
                    else if (prodStages.includes(currentStatus)) orderTimeProd += finalDm;
                    else if (pcpStages.includes(currentStatus) || currentStatus.includes('pcp')) orderTimePcp += finalDm;
                    else if (fatStages.includes(currentStatus) || currentStatus.includes('faturam')) orderTimeFat += finalDm;
                }

                // 3. Atribuição à Equipa (Se entregou, conta. Se não, acumula pro utilizador ativo)
                // --- LAYOUT ---
                if (layDeliverer) {
                    globalStats.lay.count++; globalStats.lay.totalTime += orderTimeLay;
                    if (globalStats.lay.users[layDeliverer]) { globalStats.lay.users[layDeliverer].count++; globalStats.lay.users[layDeliverer].time += orderTimeLay; }
                    const mk = new Date(lLog.date).getFullYear() + '-' + String(new Date(lLog.date).getMonth() + 1).padStart(2, '0');
                    if (!globalStats.lay.monthly[mk]) globalStats.lay.monthly[mk] = { time: 0, count: 0 };
                    globalStats.lay.monthly[mk].time += orderTimeLay; globalStats.lay.monthly[mk].count++;
                } else if (layStages.includes(currentStatus)) {
                    const inLog = revLogs.find(h => {
                        const act = String(h.action).toLowerCase();
                        return (act.includes('iniciad') || act.includes('início') || act.includes('inicio') || act.includes('assumi')) && TEAM_LAY.includes(normalizarNome(h.user));
                    });
                    if (inLog) {
                        const activeUser = normalizarNome(inLog.user);
                        if (globalStats.lay.users[activeUser]) globalStats.lay.users[activeUser].time += orderTimeLay;
                    }
                }

                // --- PRODUÇÃO ---
                if (prodDeliverer) {
                    globalStats.prod.count++; globalStats.prod.totalTime += orderTimeProd;
                    if (globalStats.prod.users[prodDeliverer]) { globalStats.prod.users[prodDeliverer].count++; globalStats.prod.users[prodDeliverer].time += orderTimeProd; }
                    const mk = new Date(prLog.date).getFullYear() + '-' + String(new Date(prLog.date).getMonth() + 1).padStart(2, '0');
                    if (!globalStats.prod.monthly[mk]) globalStats.prod.monthly[mk] = { time: 0, count: 0 };
                    globalStats.prod.monthly[mk].time += orderTimeProd; globalStats.prod.monthly[mk].count++;
                } else if (prodStages.includes(currentStatus)) {
                    const inLog = revLogs.find(h => {
                        const act = String(h.action).toLowerCase();
                        return (act.includes('iniciad') || act.includes('início') || act.includes('inicio') || act.includes('assumi')) && TEAM_PROD.includes(normalizarNome(h.user));
                    });
                    if (inLog) {
                        const activeUser = normalizarNome(inLog.user);
                        if (globalStats.prod.users[activeUser]) globalStats.prod.users[activeUser].time += orderTimeProd;
                    }
                }

                // --- PCP ---
                if (pcpDeliverer) {
                    globalStats.pcp.count++; globalStats.pcp.totalTime += orderTimePcp;
                    if (globalStats.pcp.users[pcpDeliverer]) { globalStats.pcp.users[pcpDeliverer].count++; globalStats.pcp.users[pcpDeliverer].time += orderTimePcp; }
                    const mk = new Date(pcLog.date).getFullYear() + '-' + String(new Date(pcLog.date).getMonth() + 1).padStart(2, '0');
                    if (!globalStats.pcp.monthly[mk]) globalStats.pcp.monthly[mk] = { time: 0, count: 0 };
                    globalStats.pcp.monthly[mk].time += orderTimePcp; globalStats.pcp.monthly[mk].count++;
                } else if (pcpStages.includes(currentStatus)) {
                    const inLog = revLogs.find(h => {
                        const act = String(h.action).toLowerCase();
                        return (act.includes('iniciad') || act.includes('início') || act.includes('inicio') || act.includes('assumi')) && TEAM_PCP.includes(normalizarNome(h.user));
                    });
                    if (inLog) {
                        const activeUser = normalizarNome(inLog.user);
                        if (globalStats.pcp.users[activeUser]) globalStats.pcp.users[activeUser].time += orderTimePcp;
                    }
                }

                // --- FATURAMENTO ---
                if (fatDeliverer) {
                    globalStats.fat.count++; globalStats.fat.totalTime += orderTimeFat;
                    if (globalStats.fat.users[fatDeliverer]) { globalStats.fat.users[fatDeliverer].count++; globalStats.fat.users[fatDeliverer].time += orderTimeFat; }
                    const mk = new Date(ftLog.date).getFullYear() + '-' + String(new Date(ftLog.date).getMonth() + 1).padStart(2, '0');
                    if (!globalStats.fat.monthly[mk]) globalStats.fat.monthly[mk] = { time: 0, count: 0 };
                    globalStats.fat.monthly[mk].time += orderTimeFat; globalStats.fat.monthly[mk].count++;
                } else if (fatStages.includes(currentStatus)) {
                    const inLog = revLogs.find(h => {
                        const act = String(h.action).toLowerCase();
                        return (act.includes('iniciad') || act.includes('início') || act.includes('inicio') || act.includes('assumi')) && TEAM_FAT.includes(normalizarNome(h.user));
                    });
                    if (inLog) {
                        const activeUser = normalizarNome(inLog.user);
                        if (globalStats.fat.users[activeUser]) globalStats.fat.users[activeUser].time += orderTimeFat;
                    }
                }
            });

            switchTab(activeTab); 
        }

        // =========================================================================
        // SWITCH TAB (O COMANDO CENTRAL)
        // =========================================================================
        window.switchTab = function(sectorId) {
            activeTab = sectorId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn.t-${sectorId}`).classList.add('active');

            const s = globalStats[sectorId];
            
            document.getElementById('dynamic-glow').style.background = s.color;

            const avgData = s.count > 0 ? formatTimeExec(s.totalTime / s.count) : { val: '0', unit: 'min' };
            
            let sortedUsers = Object.keys(s.users).sort((a,b) => {
                const uA = s.users[a], uB = s.users[b];
                if (uB.count !== uA.count) return uB.count - uA.count;
                const avgA = uA.count > 0 ? uA.time / uA.count : 999999;
                const avgB = uB.count > 0 ? uB.time / uB.count : 999999;
                return avgA - avgB;
            });

            let rankHtml = sortedUsers.map((user, idx) => {
                const u = s.users[user];
                const uAvg = u.count > 0 ? formatTimeExec(u.time / u.count) : formatTimeExec(u.time);
                const isAtivo = u.count === 0 && u.time > 0 ? ' (Acumulado em Fila)' : ' Média';
                const posClass = idx === 0 && u.count > 0 ? ' pos-1' : '';
                
                return `
                <div class="rank-row${posClass}">
                    <div class="rank-pos">${idx + 1}º</div>
                    <div class="r-avatar" style="border-color: ${s.color}; box-shadow: inset 0 0 10px ${s.shadow};">${user.charAt(0)}</div>
                    <div class="r-info">
                        <div class="r-name">${user}</div>
                        <div class="r-deliveries">${u.count} Entregas</div>
                    </div>
                    <div class="r-time">
                        <div class="r-time-val" style="color: ${s.color};">${uAvg.val}</div>
                        <div class="r-time-lbl">${uAvg.unit} ${isAtivo}</div>
                    </div>
                </div>`;
            }).join('');

            if(sortedUsers.length === 0) rankHtml = '<div style="color:var(--text-muted); padding: 15px;">Equipa não definida.</div>';

            const container = document.getElementById('active-sector-container');
            
            container.innerHTML = `
            <div class="sector-view show" id="view-${sectorId}">
                
                <div style="display:flex; flex-direction:column;">
                    <div class="kpi-row">
                        <div class="glass-panel kpi-box">
                            <div class="kpi-label"><i class="ph-bold ph-stack"></i> Total Entregas</div>
                            <div class="kpi-val"><span id="anim-entregas">0</span> <span style="margin-left:5px;">projetos</span></div>
                        </div>
                        <div class="glass-panel kpi-box" style="border-top-color: ${s.color};">
                            <div class="kpi-label" style="color: ${s.color};"><i class="ph-bold ph-clock"></i> Lead Time Geral</div>
                            <div class="kpi-val" style="color: ${s.color};">${avgData.val} <span style="margin-left:5px;">${avgData.unit}</span></div>
                        </div>
                    </div>

                    <div class="glass-panel chart-box" style="flex: 1;">
                        <div class="chart-title"><i class="ph-fill ph-trend-up"></i> Histórico de Entregas (Volume)</div>
                        <div id="apex-chart-${sectorId}" style="height: 250px;"></div>
                    </div>
                </div>

                <div class="glass-panel ranking-box">
                    <div class="chart-title" style="margin-bottom: 5px;"><i class="ph-fill ph-medal" style="color: #F59E0B;"></i> Ranking de Performance da Equipa</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px;">Classificado por maior volume de entregas.</div>
                    <div class="ranking-list">
                        ${rankHtml}
                    </div>
                </div>

            </div>`;

            // Anima o número de entregas
            animateCounter(document.getElementById('anim-entregas'), 0, s.count, 1000);

            setTimeout(() => { renderSectorChart(sectorId, s); }, 50);
        }

        function renderSectorChart(sectorId, sectorData) {
            const sortedMonths = Object.keys(sectorData.monthly).sort().slice(-6);
            const categories = sortedMonths.map(k => getFriendlyMonth(k));
            const dataCounts = sortedMonths.map(k => sectorData.monthly[k].count);

            const options = {
                series: [{ name: 'Volume Entregue', data: dataCounts }],
                chart: { type: 'area', height: 250, toolbar: { show: false }, background: 'transparent', fontFamily: 'Inter, sans-serif', sparkline: { enabled: false } },
                colors: [sectorData.color],
                stroke: { curve: 'smooth', width: 3 },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05, stops: [0, 100] } },
                dataLabels: { enabled: false },
                xaxis: { categories: categories, labels: { style: { colors: '#94A3B8', fontWeight: 600 } }, axisBorder: { show: false }, axisTicks: { show: false } },
                yaxis: { labels: { show: false } },
                grid: { show: false },
                tooltip: { theme: 'dark' }
            };

            if (apexChart) apexChart.destroy();
            apexChart = new ApexCharts(document.querySelector(`#apex-chart-${sectorId}`), options);
            apexChart.render();
        }
    </script>
