<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro | PMS J7S</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',Arial,sans-serif}
html,body{min-height:100%}
body{min-height:100vh;display:grid;place-items:center;overflow:hidden;color:#0c1726;background:radial-gradient(circle at 12% 14%,rgba(11,113,200,.18),transparent 28%),radial-gradient(circle at 86% 18%,rgba(243,123,33,.20),transparent 28%),radial-gradient(circle at 50% 92%,rgba(11,113,200,.10),transparent 28%),linear-gradient(135deg,#f8fbff 0%,#edf3f9 48%,#e8eef5 100%)}
.status-bg-blur{position:fixed;inset:-40px;z-index:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.34),rgba(255,255,255,.08)),radial-gradient(circle at 20% 25%,rgba(11,113,200,.16),transparent 34%),radial-gradient(circle at 82% 24%,rgba(243,123,33,.18),transparent 32%);filter:blur(18px);transform:scale(1.05)}
.status-card{position:relative;z-index:2;width:min(92vw,460px);min-height:460px;padding:46px 34px 38px;display:flex!important;opacity:1!important;visibility:visible!important;flex-direction:column;align-items:center;justify-content:center;border-radius:34px;border:1px solid rgba(255,255,255,.70);background:rgba(255,255,255,.76);box-shadow:0 34px 90px rgba(13,36,61,.18),inset 0 1px 0 rgba(255,255,255,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);text-align:center;overflow:hidden;animation:statusEnter .42s ease-out both}
.status-card:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.50),transparent 42%)}
.logo-loader{position:relative;width:154px;height:154px;margin-bottom:28px;display:grid;place-items:center}
.logo-loader:before,.logo-loader:after{content:"";position:absolute;inset:0;border-radius:999px}
.logo-loader:before{border:4px solid rgba(11,113,200,.10)}
.logo-loader:after{border:4px solid transparent;border-top-color:#0b71c8;border-right-color:#f37b21;animation:spinLoader 1.05s linear infinite;filter:drop-shadow(0 8px 14px rgba(11,113,200,.18))}
.logo-loader img{width:82px;max-height:82px;object-fit:contain;filter:drop-shadow(0 12px 22px rgba(13,36,61,.14))}
.status-title{margin-bottom:10px;color:#07111f;font-size:clamp(2rem,5vw,2.8rem);line-height:.92;font-weight:950;letter-spacing:-.07em}
.status-message{max-width:340px;color:#556171;font-size:.98rem;line-height:1.55;font-weight:700}
.loading-step{margin-top:14px;display:inline-flex;align-items:center;justify-content:center;color:#0b71c8;font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em}
.status-progress{width:min(100%,310px);height:9px;margin-top:28px;border-radius:999px;overflow:hidden;background:rgba(11,113,200,.10)}
.status-progress span{display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#0b71c8,#f37b21);animation:loadingBar 1.25s ease-in-out infinite}
.status-actions{width:100%;margin-top:28px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.status-btn{min-height:48px;padding:0 18px;border:0;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:linear-gradient(90deg,#0b71c8,#f37b21);color:#fff;box-shadow:0 18px 34px rgba(11,113,200,.18);font-size:.92rem;font-weight:900}
.status-btn.secondary{background:rgba(255,255,255,.82);color:#0c1726;border:1px solid rgba(11,113,200,.10);box-shadow:0 14px 28px rgba(13,36,61,.08)}
.error-code{margin-bottom:12px;padding:7px 12px;border-radius:999px;background:rgba(239,68,68,.10);color:#dc2626;font-size:.72rem;font-weight:950;letter-spacing:.08em;text-transform:uppercase}
.error-mode .logo-loader:after{border-top-color:#ef4444;border-right-color:#f37b21}
@keyframes spinLoader{to{transform:rotate(360deg)}}
@keyframes loadingBar{0%{transform:translateX(-110%)}55%{transform:translateX(105%)}100%{transform:translateX(105%)}}
@keyframes statusEnter{from{opacity:0;transform:translateY(14px) scale(.985);filter:blur(4px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
@media(max-width:640px){.status-card{min-height:420px;padding:38px 22px 32px}.logo-loader{width:132px;height:132px}.logo-loader img{width:72px;max-height:72px}}
</style>
</head>
<body class="error-mode">
<div class="status-bg-blur"></div>
<main class="status-card">
  <div class="error-code" id="error-code">Erro no sistema</div>
  <div class="logo-loader">
    <img src="assets/img/logo.png" alt="Logo J7S" onerror="this.style.display='none'">
  </div>
  <h1 class="status-title" id="error-title">Algo deu errado</h1>
  <p class="status-message" id="error-message">Não foi possível concluir a operação. Tente novamente ou volte para a tela inicial.</p>
  <div class="status-actions">
    <a class="status-btn" href="index.html">Voltar ao Login</a>
    <button class="status-btn secondary" onclick="history.back()">Voltar</button>
  </div>
</main>
<script src="assets/js/pages/erro.js"></script>
</body>
</html>
